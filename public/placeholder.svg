<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000" role="img" aria-labelledby="title desc">
  <title id="title">Product image placeholder</title>
  <desc id="desc">Neutral placeholder for missing product images.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2f2f2" />
      <stop offset="100%" stop-color="#e6e6e6" />
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)" />
  <rect x="80" y="120" width="640" height="760" rx="36" ry="36" fill="#ffffff" stroke="#d9d9d9" stroke-width="6" />
  <g fill="#b3b3b3">
    <circle cx="400" cy="420" r="110" />
    <rect x="230" y="560" width="340" height="40" rx="20" />
    <rect x="280" y="630" width="240" height="32" rx="16" />
  </g>
  <text x="400" y="760" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#9b9b9b">No image available</text>
</svg>
